<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!--
      Mobile-first:
      El zoom-al-tocar-inputs en iOS se evita con font-size>=16px en los campos
      (ya aplicado en select/input), NO bloqueando el zoom del usuario. Permitir
      pinch-zoom es un requisito de accesibilidad (WCAG 1.4.4 Resize Text).
      viewport-fit=cover habilita el uso de safe-area (notch / barra inferior).
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#101010" />
    <meta
      name="description"
      content="La Central - Verduleria boutique en Caballito. La mejor calidad y variedad de productos. Pedidos por WhatsApp."
    />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Tipografia boutique: Fraunces (display serif) + Manrope (UI sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>La Central · Verdulería Boutique</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
